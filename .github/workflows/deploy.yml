name: Deploy to GitHub Pages

on:
  push:
    branches: 'main' # Change to 'master' if needed

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install and Build
        run: |
          npm install
          npm run build

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # The folder Vite generates
          branch: gh-pages # The branch where built files go
